services:

  # ── PostgreSQL ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    platform: linux/amd64
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-soukpilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-soukpilot_secret}
      POSTGRES_DB: ${POSTGRES_DB:-soukpilot_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-soukpilot}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    platform: linux/amd64
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  # ── Chroma (vector store) — enabled in Phase 4 (RAG) ────
  # Uncomment when you reach Phase 4
  # chromadb:
  #   image: chromadb/chroma:latest
  #   restart: unless-stopped
  #   ports:
  #     - "8000:8000"
  #   volumes:
  #     - chroma_data:/chroma/chroma

  # ── FastAPI Backend ─────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-soukpilot}:${POSTGRES_PASSWORD:-soukpilot_secret}@postgres:5432/${POSTGRES_DB:-soukpilot_db}
      REDIS_URL: redis://redis:6379/0
      CHROMA_HOST: localhost
      CHROMA_PORT: 8000
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
      - ./ml_models:/app/ml_models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8080 --reload

  # ── Celery Worker ───────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-soukpilot}:${POSTGRES_PASSWORD:-soukpilot_secret}@postgres:5432/${POSTGRES_DB:-soukpilot_db}
      REDIS_URL: redis://redis:6379/0
      CHROMA_HOST: localhost
      CHROMA_PORT: 8000
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
      - ./ml_models:/app/ml_models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.workers.celery_app worker --loglevel=info -Q default,ocr,indexing,reports,forecasting

  # ── Celery Beat (scheduler) ─────────────────────────────
  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-soukpilot}:${POSTGRES_PASSWORD:-soukpilot_secret}@postgres:5432/${POSTGRES_DB:-soukpilot_db}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      - redis
      - worker
    command: celery -A app.workers.celery_app beat --loglevel=info

  # ── React Frontend ──────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost:8080
    depends_on:
      - backend

volumes:
  postgres_data:
  chroma_data:
  uploads_data:
