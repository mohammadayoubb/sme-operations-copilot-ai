<svg width="800" height="800" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="42%" r="65%">
      <stop offset="0%" stop-color="#111328"/>
      <stop offset="100%" stop-color="#060818"/>
    </radialGradient>

    <!-- Arch glow -->
    <radialGradient id="archGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(99,102,241,0.28)"/>
      <stop offset="100%" stop-color="rgba(99,102,241,0)"/>
    </radialGradient>

    <!-- Soft glow filter on arch strokes -->
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="800" height="800" rx="120" fill="url(#bgGrad)"/>

  <!-- Subtle top-left aurora blob -->
  <ellipse cx="160" cy="160" rx="220" ry="200"
           fill="rgba(99,102,241,0.07)"/>

  <!-- Subtle bottom-right aurora blob -->
  <ellipse cx="660" cy="660" rx="200" ry="180"
           fill="rgba(168,85,247,0.06)"/>

  <!-- Arch glow halo -->
  <ellipse cx="400" cy="310" rx="210" ry="230"
           fill="url(#archGlow)"/>

  <!--
    Arch icon — original viewBox coords: 36 × 40 units
    Scale ×8 → 288 × 320 px
    Center horizontally: (800 − 288) / 2 = 256
    Top of arch at y = 108
  -->
  <g transform="translate(256, 108) scale(8)" filter="url(#glow)">
    <!-- Outer arch -->
    <path d="M4 36 L4 19 Q4 4 18 4 Q32 4 32 19 L32 36"
          stroke="#818cf8" stroke-width="2.1" stroke-linecap="round" fill="none"/>
    <!-- Inner arch -->
    <path d="M9 36 L9 20 Q9 10 18 10 Q27 10 27 20 L27 36"
          stroke="#a5b4fc" stroke-width="1.1" stroke-linecap="round" fill="none" opacity="0.45"/>
    <!-- Base line -->
    <line x1="1" y1="36" x2="35" y2="36"
          stroke="#818cf8" stroke-width="2.1" stroke-linecap="round"/>
  </g>

  <!-- Divider line -->
  <line x1="300" y1="480" x2="500" y2="480"
        stroke="rgba(129,140,248,0.2)" stroke-width="1" stroke-linecap="round"/>

  <!-- SOUK -->
  <text x="400" y="548"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="42" font-weight="300"
        fill="rgba(255,255,255,0.28)"
        text-anchor="middle"
        letter-spacing="22">SOUK</text>

  <!-- PILOT -->
  <text x="388" y="640"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="82" font-weight="800"
        fill="rgba(255,255,255,0.92)"
        text-anchor="middle"
        letter-spacing="14">PILOT</text>

  <!-- AI badge -->
  <text x="614" y="640"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="28" font-weight="700"
        fill="#818cf8"
        letter-spacing="2">AI</text>

  <!-- Subtle bottom tagline -->
  <text x="400" y="714"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="18" font-weight="400"
        fill="rgba(255,255,255,0.14)"
        text-anchor="middle"
        letter-spacing="5">OPERATIONS COPILOT</text>
</svg>
